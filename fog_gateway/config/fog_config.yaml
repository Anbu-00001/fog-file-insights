server:
  host: "0.0.0.0"
  port: 5000

policy:
  null_pct_threshold: 0.30
  min_rows: 1

forward:
  url: "http://localhost:8000/api/ingest/"
  timeout_seconds: 10
  max_retries: 3
  retry_backoff_seconds: 2

auth:
  fog_token: "super-secret-demo-token"

retry:
  retry_interval_seconds: 20
  max_pending_attempts: 10

storage:
  forwarded_dir: "forwarded_files"
  quarantine_dir: "quarantined_files"
  pending_dir: "pending_files"
  max_upload_size_bytes: 5242880
